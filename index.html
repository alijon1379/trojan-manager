<title>Trojan Link Manager</title>
<style>
:root{
  --bg:#0A0F1C;
  --panel:#0F1626;
  --panel-2:#0B1220;
  --border:#1F2937;
  --border-soft:#182131;
  --text:#E2E8F0;
  --muted:#64748B;
  --muted-2:#3F4C5F;
  --sky:#38BDF8;
  --sky-soft:rgba(56,189,248,0.10);
  --sky-border:rgba(56,189,248,0.30);
  --emerald:#34D399;
  --emerald-soft:rgba(52,211,153,0.10);
  --emerald-border:rgba(52,211,153,0.30);
  --rose:#F43F5E;
  --rose-soft:rgba(244,63,94,0.08);
  --rose-border:rgba(244,63,94,0.30);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(56,189,248,0.08), transparent),
    var(--bg);
  color:var(--text);
  font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

.wrap{max-width:1152px;margin:0 auto;padding:32px 20px;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.logo{width:36px;height:36px;border-radius:10px;background:var(--sky-soft);border:1px solid var(--sky-border);
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.title{font-size:17px;font-weight:600;letter-spacing:-0.01em;color:#F1F5F9;margin:0;}
.subtitle{font-size:13px;color:var(--muted);margin:0 0 24px 48px;}

.status-strip{margin:0 0 24px 48px;display:flex;flex-wrap:wrap;gap:8px;font-family:ui-monospace,'JetBrains Mono',Menlo,monospace;font-size:12px;}
.badge{padding:5px 10px;border-radius:6px;background:#0D1421;border:1px solid var(--border);color:var(--muted);}
.badge-ok{background:var(--emerald-soft);border-color:var(--emerald-border);color:var(--emerald);display:inline-flex;align-items:center;gap:4px;}
.badge-warn{background:var(--rose-soft);border-color:var(--rose-border);color:var(--rose);display:inline-flex;align-items:center;gap:4px;}

.grid{display:grid;grid-template-columns:1fr;gap:24px;}
@media(min-width:1024px){.grid{grid-template-columns:1fr 1fr;}}
.col{display:flex;flex-direction:column;gap:24px;}

.panel{border:1px solid var(--border);background:rgba(15,22,38,0.55);border-radius:12px;padding:16px;}
.panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:0 0 12px 0;}
.hint{font-size:11px;color:var(--muted-2);margin-top:8px;}

textarea,input[type=text],input[type=number],select{
  width:100%;border-radius:8px;background:var(--panel-2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;font-size:13px;font-family:ui-monospace,'JetBrains Mono',Menlo,monospace;
  outline:none;transition:border-color .15s ease;
}
textarea::placeholder,input::placeholder{color:var(--muted-2);}
textarea:focus,input:focus,select:focus{border-color:rgba(56,189,248,0.6);}
textarea{resize:vertical;line-height:1.5;}
.ta-input{height:160px;}
.ta-output{height:224px;}
select{font-family:inherit;padding:8px 10px;}

.field{display:block;}
.field-label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.btn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;border:1px solid transparent;
  font-size:13px;font-weight:500;cursor:pointer;padding:9px 14px;transition:background-color .15s ease,opacity .15s ease;}
.btn:disabled{cursor:not-allowed;opacity:.45;}
.btn-primary{background:var(--sky);color:#04121D;border:none;}
.btn-primary:hover:not(:disabled){background:#5FC9FA;}
.btn-primary:disabled{background:#1B2534;color:var(--muted-2);}
.btn-ghost{background:transparent;color:var(--sky);border:none;padding:0;font-size:12px;}
.btn-ghost:hover{color:#7FD4FC;}
.btn-copy{background:var(--emerald-soft);border:1px solid var(--emerald-border);color:var(--emerald);font-size:12px;padding:7px 12px;}
.btn-copy:hover:not(:disabled){background:rgba(52,211,153,0.18);}
.icon-btn{background:transparent;border:none;color:var(--muted-2);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;}
.icon-btn:hover{color:var(--rose);background:rgba(244,63,94,0.10);}

.param-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.param-row select{width:90px;flex-shrink:0;}
.param-row input{flex:1;min-width:0;}

.link-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;padding-right:4px;}
.link-row{border-radius:8px;border:1px solid var(--border);background:rgba(4,8,16,0.5);padding:12px;}
.link-row.invalid{border-color:var(--rose-border);background:var(--rose-soft);}
.link-row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.link-host{font-family:ui-monospace,monospace;font-size:11px;color:rgba(56,189,248,0.85);display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-err{color:var(--rose);font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.link-raw{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-row-controls{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.flag-input{width:56px;flex-shrink:0;text-align:center;padding:6px 8px;font-size:12px;}
.custom-label-input{margin-bottom:8px;padding:7px 10px;font-size:12px;}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);white-space:nowrap;}
.checkbox-label input{width:auto;accent-color:var(--sky);}
.label-preview{font-family:ui-monospace,monospace;font-size:11px;color:rgba(52,211,153,0.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.empty-state{font-size:12px;color:var(--muted-2);text-align:center;padding:24px 0;}
.output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

/* ---------------- mobile ---------------- */
@media(max-width:640px){
  .wrap{padding:16px 12px;}
  .header{gap:8px;}
  .logo{width:32px;height:32px;font-size:14px;border-radius:8px;}
  .title{font-size:15px;}
  .subtitle{margin-left:0;font-size:12.5px;}
  .status-strip{margin-left:0;}
  .row-2,.row-3{grid-template-columns:1fr;gap:10px;}
  .panel{padding:14px;border-radius:10px;}
  .grid{gap:16px;}
  .col{gap:16px;}
  .ta-input{height:130px;}
  .ta-output{height:180px;}
  .btn-primary,.btn-copy{width:100%;justify-content:center;}
  .output-header{flex-wrap:wrap;gap:8px;}
  .link-list{max-height:340px;}
  .param-row{flex-wrap:wrap;}
  .param-row select{width:auto;flex:0 0 auto;}
  .param-row input{flex:1 1 100px;}
  input[type=text],input[type=number],select,textarea{font-size:16px;} /* prevents iOS auto-zoom on focus */
}
@media(max-width:400px){
  .row-3{grid-template-columns:1fr;}
}
</style>
</head>

<script>
const { useState, useMemo, useCallback } = React;
const e = React.createElement;

/* ---------------- parsing helpers ---------------- */
const FLAG_RE = /(\uD83C[\uDDE6-\uDDFF]){2}/;
function guessFlag(label) { const m = label.match(FLAG_RE); return m ? m[0] : ""; }

let uidCounter = 0;
function nextId() { uidCounter += 1; return "link-" + uidCounter + "-" + Date.now(); }

function parseTrojanLink(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return null;
  try {
    const u = new URL(trimmed);
    if (u.protocol.replace(":", "") !== "trojan") {
      throw new Error('Unsupported scheme "' + u.protocol.replace(":", "") + '"');
    }
    const password = decodeURIComponent(u.username || "");
    const host = u.hostname;
    const port = u.port;
    const path = u.pathname && u.pathname !== "/" ? u.pathname : "";
    const params = [...new URLSearchParams(u.search).entries()];
    const label = u.hash ? decodeURIComponent(u.hash.slice(1)) : "";
    if (!host || !port) throw new Error("Missing host or port");
    return {
      id: nextId(), raw: trimmed, valid: true, error: null,
      password, host, port, path, params,
      originalLabel: label, flag: guessFlag(label),
      customLabel: false, customLabelText: label,
    };
  } catch (err) {
    return { id: nextId(), raw: trimmed, valid: false, error: err.message || "Could not parse this line" };
  }
}

function buildQueryString(params) {
  return params.map(([k, v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v)).join("&");
}

/* ---------------- main component ---------------- */
function TrojanLinkManager() {
  const [rawInput, setRawInput] = useState("");
  const [links, setLinks] = useState([]);
  const [startNumber, setStartNumber] = useState(35);
  const [namePattern, setNamePattern] = useState("[{n}] @iran_v2rey\uD83D\uDC99 {flag}");
  const [globalFlag, setGlobalFlag] = useState("");

  const [bulkHost, setBulkHost] = useState("");
  const [bulkPort, setBulkPort] = useState("");
  const [bulkSni, setBulkSni] = useState("");
  const [customParams, setCustomParams] = useState([]);
  const [copied, setCopied] = useState(false);

  const handleParse = useCallback(() => {
    const rows = rawInput.split("\n").map((l) => l.trim()).filter(Boolean)
      .map(parseTrojanLink).filter(Boolean);
    setLinks(rows);
  }, [rawInput]);

  const validCount = links.filter((l) => l.valid).length;
  const invalidCount = links.length - validCount;

  const updateLink = (id, patch) => setLinks((prev) => prev.map((l) => (l.id === id ? Object.assign({}, l, patch) : l)));
  const removeLink = (id) => setLinks((prev) => prev.filter((l) => l.id !== id));

  const addCustomParam = () => setCustomParams((prev) => prev.concat([{ id: nextId(), key: "", value: "", action: "set" }]));
  const updateCustomParam = (id, patch) => setCustomParams((prev) => prev.map((p) => (p.id === id ? Object.assign({}, p, patch) : p)));
  const removeCustomParam = (id) => setCustomParams((prev) => prev.filter((p) => p.id !== id));

  const applyBulkToLink = useCallback((link) => {
    let params = link.params.map(([k, v]) => [k, v]);
    customParams.forEach((cp) => {
      if (!cp.key) return;
      const idx = params.findIndex(([k]) => k === cp.key);
      if (cp.action === "remove") { if (idx > -1) params.splice(idx, 1); }
      else { if (idx > -1) params[idx][1] = cp.value; else params.push([cp.key, cp.value]); }
    });
    let host = bulkHost.trim() ? bulkHost.trim() : link.host;
    let port = bulkPort.trim() ? bulkPort.trim() : link.port;
    if (bulkSni.trim()) {
      const idx = params.findIndex(([k]) => k === "sni");
      if (idx > -1) params[idx][1] = bulkSni.trim(); else params.push(["sni", bulkSni.trim()]);
    }
    return Object.assign({}, link, { host, port, params });
  }, [bulkHost, bulkPort, bulkSni, customParams]);

  const buildLabel = (link, number) => {
    if (link.customLabel) return link.customLabelText;
    const flag = link.flag || globalFlag || "";
    return namePattern.split("{n}").join(String(number)).split("{flag}").join(flag).split("{original}").join(link.originalLabel);
  };

  const buildLinkString = (link, label) => {
    const qs = buildQueryString(link.params);
    return "trojan://" + encodeURIComponent(link.password) + "@" + link.host + ":" + link.port + link.path + (qs ? "?" + qs : "") + "#" + encodeURIComponent(label);
  };

  const output = useMemo(() => {
    let n = Number(startNumber) || 0;
    return links.map((link) => {
      if (!link.valid) return { id: link.id, valid: false, text: null };
      const merged = applyBulkToLink(link);
      const label = buildLabel(link, n);
      const text = buildLinkString(merged, label);
      n += 1;
      return { id: link.id, valid: true, text, number: n - 1, label };
    });
    // eslint-disable-next-line
  }, [links, startNumber, namePattern, globalFlag, applyBulkToLink]);

  const outputText = output.filter((o) => o.valid).map((o) => o.text).join("\n");

  const handleCopyAll = async () => {
    if (!outputText) return;
    try {
      await navigator.clipboard.writeText(outputText);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (err) {
      // fallback for browsers without clipboard permission
      const ta = document.createElement("textarea");
      ta.value = outputText;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 1800); } catch (e2) {}
      document.body.removeChild(ta);
    }
  };

  /* ----- sub-renderers ----- */

  function renderStatusStrip() {
    if (links.length === 0) return null;
    const children = [
      e("span", { className: "badge", key: "total" }, links.length + " parsed"),
      e("span", { className: "badge badge-ok", key: "valid" }, "\u2713 " + validCount + " valid"),
    ];
    if (invalidCount > 0) children.push(e("span", { className: "badge badge-warn", key: "invalid" }, "\u26A0 " + invalidCount + " invalid"));
    return e("div", { className: "status-strip" }, children);
  }

  function renderInputPanel() {
    return e("section", { className: "panel" }, [
      e("h2", { className: "panel-title", key: "t" }, "1. Paste links"),
      e("textarea", {
        key: "ta",
        className: "ta-input",
        value: rawInput,
        spellCheck: false,
        placeholder: "trojan://password@host:443?security=tls&sni=example.com#Old-Label\ntrojan://password@host2:443?security=tls&sni=example.com#Another",
        onChange: (ev) => setRawInput(ev.target.value),
      }),
      e("div", { key: "btnwrap", style: { marginTop: "12px" } },
        e("button", {
          className: "btn btn-primary",
          disabled: !rawInput.trim(),
          onClick: handleParse,
        }, "\u21BB  Parse links")
      ),
    ]);
  }

  function renderNamingPanel() {
    return e("section", { className: "panel" }, [
      e("h2", { className: "panel-title", key: "t" }, "2. Naming convention"),
      e("div", { className: "row-2", key: "row1" }, [
        e("label", { className: "field", key: "sn" }, [
          e("span", { className: "field-label", key: "l" }, "Starting number"),
          e("input", { type: "number", value: startNumber, onChange: (ev) => setStartNumber(ev.target.value) }),
        ]),
        e("label", { className: "field", key: "df" }, [
          e("span", { className: "field-label", key: "l" }, "Default flag"),
          e("input", { type: "text", value: globalFlag, placeholder: "\uD83C\uDDE9\uD83C\uDDEA", onChange: (ev) => setGlobalFlag(ev.target.value) }),
        ]),
      ]),
      e("label", { className: "field", key: "pattern", style: { marginTop: "12px", display: "block" } }, [
        e("span", { className: "field-label", key: "l" }, "Label pattern \u2014 use {n}, {flag}, {original}"),
        e("input", { type: "text", value: namePattern, onChange: (ev) => setNamePattern(ev.target.value) }),
      ]),
      e("p", { className: "hint", key: "hint" }, "Per-row flag or a fully custom label can override this \u2014 edit any row on the right."),
    ]);
  }

  function renderParamRow(cp) {
    const fields = [
      e("select", {
        key: "action",
        value: cp.action,
        onChange: (ev) => updateCustomParam(cp.id, { action: ev.target.value }),
      }, [
        e("option", { value: "set", key: "set" }, "set"),
        e("option", { value: "remove", key: "remove" }, "remove"),
      ]),
      e("input", {
        key: "key",
        type: "text",
        value: cp.key,
        placeholder: "key",
        onChange: (ev) => updateCustomParam(cp.id, { key: ev.target.value }),
      }),
    ];
    if (cp.action === "set") {
      fields.push(e("input", {
        key: "value",
        type: "text",
        value: cp.value,
        placeholder: "value",
        onChange: (ev) => updateCustomParam(cp.id, { value: ev.target.value }),
      }));
    }
    fields.push(e("button", {
      key: "del",
      className: "icon-btn",
      onClick: () => removeCustomParam(cp.id),
      title: "Remove",
    }, "\u2715"));
    return e("div", { className: "param-row", key: cp.id }, fields);
  }

  function renderBulkPanel() {
    return e("section", { className: "panel" }, [
      e("h2", { className: "panel-title", key: "t" }, "3. Bulk edit (applies to every link)"),
      e("div", { className: "row-3", key: "row1" }, [
        e("label", { className: "field", key: "host" }, [
          e("span", { className: "field-label", key: "l" }, "Host"),
          e("input", { type: "text", value: bulkHost, placeholder: "unchanged", onChange: (ev) => setBulkHost(ev.target.value) }),
        ]),
        e("label", { className: "field", key: "port" }, [
          e("span", { className: "field-label", key: "l" }, "Port"),
          e("input", { type: "text", value: bulkPort, placeholder: "unchanged", onChange: (ev) => setBulkPort(ev.target.value) }),
        ]),
        e("label", { className: "field", key: "sni" }, [
          e("span", { className: "field-label", key: "l" }, "SNI"),
          e("input", { type: "text", value: bulkSni, placeholder: "unchanged", onChange: (ev) => setBulkSni(ev.target.value) }),
        ]),
      ]),
      e("div", { key: "row2", style: { display: "flex", alignItems: "center", justifyContent: "space-between", margin: "16px 0 8px" } }, [
        e("span", { key: "l", style: { fontSize: "12px", color: "var(--muted)" } }, "Custom query parameters"),
        e("button", { key: "add", className: "btn-ghost", onClick: addCustomParam }, "+ Add param"),
      ]),
      e("div", { key: "list" }, customParams.length > 0
        ? customParams.map(renderParamRow)
        : e("p", { className: "hint", style: { marginTop: 0 } }, "No custom parameters added.")
      ),
    ]);
  }

  function renderLinkRow(link, i) {
    const out = output[i];
    if (!link.valid) {
      return e("div", { className: "link-row invalid", key: link.id }, [
        e("div", { className: "link-row-top", key: "top" }, [
          e("div", { key: "l", style: { minWidth: 0 } }, [
            e("div", { className: "link-err", key: "err" }, "\u26A0  " + link.error),
            e("p", { className: "link-raw", key: "raw" }, link.raw),
          ]),
          e("button", { key: "del", className: "icon-btn", onClick: () => removeLink(link.id) }, "\uD83D\uDDD1"),
        ]),
      ]);
    }
    const children = [
      e("div", { className: "link-row-top", key: "top" }, [
        e("span", { className: "link-host", key: "host" }, "\u203A " + link.host + ":" + link.port),
        e("button", { key: "del", className: "icon-btn", onClick: () => removeLink(link.id) }, "\uD83D\uDDD1"),
      ]),
      e("div", { className: "link-row-controls", key: "controls" }, [
        e("input", {
          key: "flag",
          className: "flag-input",
          type: "text",
          value: link.flag,
          placeholder: "flag",
          onChange: (ev) => updateLink(link.id, { flag: ev.target.value }),
        }),
        e("label", { className: "checkbox-label", key: "cl" }, [
          e("input", {
            key: "cb",
            type: "checkbox",
            checked: link.customLabel,
            onChange: (ev) => updateLink(link.id, { customLabel: ev.target.checked }),
          }),
          "custom label",
        ]),
      ]),
    ];
    if (link.customLabel) {
      children.push(e("input", {
        key: "customtext",
        className: "custom-label-input",
        type: "text",
        value: link.customLabelText,
        onChange: (ev) => updateLink(link.id, { customLabelText: ev.target.value }),
      }));
    }
    children.push(e("p", { className: "label-preview", key: "preview" }, "#" + (out && out.label ? out.label : "")));
    return e("div", { className: "link-row", key: link.id }, children);
  }

  function renderLinksPanel() {
    return e("section", { className: "panel" }, [
      e("h2", { className: "panel-title", key: "t" }, "Links (" + links.length + ")"),
      links.length === 0
        ? e("p", { className: "empty-state", key: "empty" }, 'Paste links on the left and click "Parse links" to begin.')
        : e("div", { className: "link-list", key: "list" }, links.map(renderLinkRow)),
    ]);
  }

  function renderOutputPanel() {
    return e("section", { className: "panel" }, [
      e("div", { className: "output-header", key: "h" }, [
        e("h2", { className: "panel-title", key: "t", style: { margin: 0 } }, "Output (" + output.filter((o) => o.valid).length + ")"),
        e("button", {
          key: "copy",
          className: "btn btn-copy",
          disabled: !outputText,
          onClick: handleCopyAll,
        }, copied ? "\u2713 Copied" : "\u2398 Copy all"),
      ]),
      e("textarea", {
        key: "out",
        className: "ta-output",
        readOnly: true,
        value: outputText,
        placeholder: "Modified links will appear here.",
      }),
    ]);
  }

  return e("div", { className: "wrap" }, [
    e("div", { className: "header", key: "header" }, [
      e("div", { className: "logo", key: "logo" }, "\uD83D\uDD17"),
      e("h1", { className: "title", key: "title" }, "Trojan Link Manager"),
    ]),
    e("p", { className: "subtitle", key: "subtitle" }, "Parse, rename, and bulk-edit trojan:// links. Nothing leaves your browser."),
    renderStatusStrip(),
    e("div", { className: "grid", key: "grid" }, [
      e("div", { className: "col", key: "left" }, [renderInputPanel(), renderNamingPanel(), renderBulkPanel()]),
      e("div", { className: "col", key: "right" }, [renderLinksPanel(), renderOutputPanel()]),
    ]),
  ]);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(TrojanLinkManager));
</script>
</body>
</html>
